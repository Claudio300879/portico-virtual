<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pórtico Virtual - Urbanización Ruta 36</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #10b981;
            --dark: #1f2937;
            --light: #f3f4f6;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--light); color: var(--dark); padding: 15px; }
        
        /* Contenedor Principal */
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Encabezado */
        header { text-align: center; margin-bottom: 20px; }
        h1 { color: var(--primary); font-size: 24px; margin-bottom: 5px; }
        .badge { background: #fee2e2; color: #dc2626; padding: 8px; border-radius: 8px; font-size: 13px; font-weight: bold; margin-top: 10px; display: block; text-align: left; }
        
        /* Botones de Acción */
        .btn { display: flex; align-items: center; justify-content: center; width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 16px; border: none; cursor: pointer; }
        .btn-call { background-color: var(--primary); color: white; }
        .btn-doc { background-color: var(--secondary); color: white; }
        
        /* Buscador */
        .search-box { margin: 20px 0; }
        .search-box h3 { margin-bottom: 8px; font-size: 16px; color: var(--primary); }
        input[type="text"] { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }
        
        /* Resultados */
        .result-card { background: #f9fafb; border-left: 5px solid var(--primary); padding: 15px; border-radius: 0 8px 8px 0; margin-top: 15px; display: none; }
        .result-card h4 { margin-bottom: 5px; color: var(--primary); }
        .status { inline-size: max-content; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-top: 8px; }
        .status-obra { background: #fef3c7; color: #d97706; }
        .status-listo { background: #d1fae5; color: #059669; }
        .status-vacio { background: #e5e7eb; color: #4b5563; }
        
        /* Info del Loteo */
        .info-footer { font-size: 13px; color: #6b7280; margin-top: 20px; border-top: 1px solid #e5e7eb; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 id="barrio-nombre">Cargando...</h1>
        <div id="aviso-alerta" class="badge" style="display: none;"></div>
    </header>

    <a href="#" id="link-guardia" class="btn btn-call">📞 Llamar a Guardia</a>
    <a href="#" id="link-reglamento" target="_blank" class="btn btn-doc">📄 Ver Reglamento de Obras</a>

    <div class="search-box">
        <h3>¿Qué manzana o calle buscás?</h3>
        <input type="text" id="buscador" placeholder="Ej: Manzana 8, Los Cedros...">
    </div>

    <div id="resultado" class="result-card">
        <h4 id="res-mza">Manzana X</h4>
        <p><strong>Calle:</strong> <span id="res-calle">-</span></p>
        <p style="margin-top: 5px;"><strong>Cómo llegar:</strong> <span id="res-ref">-</span></p>
        <div id="res-estado" class="status">-</div>
    </div>

    <div class="info-footer">
        <p><strong>Horario de ingreso:</strong> <span id="info-horario">-</span></p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
