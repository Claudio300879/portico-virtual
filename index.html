<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pórtico Virtual - Urbanización Potreros de Quijano</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Encabezado dinámico -->
        <h1 id="nombre-barrio">Cargando barrio...</h1>

        <!-- Botones de Acción Rápida -->
        <div class="botones-container">
            <a id="btn-llamar" href="#" class="btn btn-primario">
                📞 Llamar a Guardia
            </a>
            <a id="btn-reglamento" href="#" target="_blank" class="btn btn-secundario">
                📄 Ver Reglamento de Obras
            </a>
        </div>

        <!-- Buscador Inteligente de Lotes y Calles -->
        <div class="buscador-box">
            <label class="search-label" for="search-input">¿Qué manzana o calle buscás?</label>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Ej: Manzana 8, Los Cedros, Las Tunas...">
                <button id="search-button" aria-label="Buscar">🔍</button>
            </div>
        </div>

        <!-- Contenedor de Resultados del Buscador -->
        <div id="resultados-lotes" class="resultados-container"></div>

        <!-- Panel de Información de Horarios -->
        <div class="info-box">
            <p id="horario-ingreso"><strong>Horario de ingreso:</strong> Cargando...</p>
        </div>

        <!-- Alerta de Avisos Importantes (Camiones, lluvias, etc.) -->
        <div id="alerta-aviso" class="alerta-box" style="display: none;">
            <p id="texto-aviso"></p>
        </div>
    </div>

    <!-- Vinculación con los scripts -->
    <script src="app.js"></script>
</body>
</html>
